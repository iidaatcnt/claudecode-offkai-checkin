<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロコ導入 問診チェック</title>
<style>
  :root { --brand: #DA7756; --brand-dark: #c0643e; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: #f5f0ed; color: #333; font-size: 16px; }

  .container { max-width: 640px; margin: 0 auto; padding: 12px 16px; }

  header { background: var(--brand); color: white; padding: 20px 16px; text-align: center; }
  header h1 { font-size: 1.25rem; font-weight: bold; }
  header p { font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-top: 4px; }

  .intro { background: white; padding: 14px 16px; font-size: 0.95rem; line-height: 1.7; }

  /* 質問カード */
  .q-card { background: white; border-radius: 10px; margin: 12px 0; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #ddd; transition: border-color 0.2s; }
  .q-card.answered-ok   { border-left-color: #27ae60; }
  .q-card.answered-warn { border-left-color: #e67e22; }
  .q-card.answered-ng   { border-left-color: #e74c3c; }
  .q-card.answered-stop { border-left-color: #8e44ad; }

  .q-num  { font-size: 0.75rem; color: #999; margin-bottom: 4px; }
  .q-text { font-size: 1rem; font-weight: bold; line-height: 1.5; margin-bottom: 14px; }

  /* ボタングループ：SP では縦並び */
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    flex: 1 1 auto;
    min-width: 0;
    padding: 14px 12px;
    border: 2px solid #ccc;
    border-radius: 8px;
    background: white;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.75; }

  .btn-green  { color: #27ae60; border-color: #27ae60; }
  .btn-red    { color: #e74c3c; border-color: #e74c3c; }
  .btn-blue   { color: var(--brand); border-color: var(--brand); }
  .btn-orange { color: #e67e22; border-color: #e67e22; }
  .btn-purple { color: #8e44ad; border-color: #8e44ad; }
  .btn-gray   { color: #7f8c8d; border-color: #7f8c8d; }

  .btn-green.active  { background: #27ae60; color: white; border-color: #27ae60; }
  .btn-red.active    { background: #e74c3c; color: white; border-color: #e74c3c; }
  .btn-blue.active   { background: var(--brand); color: white; border-color: var(--brand); }
  .btn-orange.active { background: #e67e22; color: white; border-color: #e67e22; }
  .btn-purple.active { background: #8e44ad; color: white; border-color: #8e44ad; }
  .btn-gray.active   { background: #7f8c8d; color: white; border-color: #7f8c8d; }

  .q-note { font-size: 0.82rem; color: #666; margin-top: 12px; line-height: 1.6; border-top: 1px solid #f0f0f0; padding-top: 10px; }

  /* 警告ブロック */
  .alert { border-radius: 8px; padding: 12px 14px; font-size: 0.9rem; line-height: 1.7; margin-top: 12px; }
  .alert-stop  { background: #f5eef8; border: 1px solid #8e44ad; color: #6c3483; }
  .alert-warn  { background: #fef9e7; border: 1px solid #e67e22; color: #935116; }
  .alert-ng    { background: #fdedec; border: 1px solid #e74c3c; color: #922b21; }
  .alert-ok    { background: #eafaf1; border: 1px solid #27ae60; color: #1e8449; }

  /* 下書きエリア */
  .result-box { background: white; border-radius: 10px; margin: 16px 0; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .result-box h2 { font-size: 1rem; margin-bottom: 10px; }

  textarea { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 0.9rem; resize: none; font-family: inherit; line-height: 1.7; background: #fafafa; }

  .copy-btn  { display: block; width: 100%; margin-top: 12px; padding: 16px; background: var(--brand); color: white; border: none; border-radius: 8px; font-size: 1.05rem; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .copy-btn:active { background: var(--brand-dark); }
  .copy-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
  .copy-msg  { text-align: center; font-size: 0.85rem; color: #27ae60; margin-top: 8px; min-height: 20px; }
  .reset-btn { display: block; width: 100%; margin-top: 10px; padding: 14px; background: white; color: #888; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }

  /* SP 調整 */
  @media (max-width: 480px) {
    header h1 { font-size: 1.1rem; }
    .q-text { font-size: 0.98rem; }
    .btn-group { flex-direction: column; }
    .btn { width: 100%; flex: none; }
  }
</style>
</head>
<body>

<header>
  <h1>クロコ導入 問診チェック</h1>
  <p>Claude Code デスクトップアプリ版</p>
</header>

<div class="container">
  <div class="intro">
    こんにちは。オフ会の受付代わりに、以下の問診チェックの結果をこのチャットで教えてください！
  </div>

  <div id="q-list"></div>

  <div class="result-box">
    <h2>📋 チャットに貼り付ける下書き</h2>
    <div id="draft-status"></div>
    <textarea id="draft" readonly placeholder="すべての質問に答えると、ここに下書きが表示されます。"></textarea>
    <button class="copy-btn" onclick="copyDraft()" disabled>コピーする</button>
    <div class="copy-msg" id="copy-msg"></div>
    <button class="reset-btn" onclick="resetAll()">リセット</button>
  </div>
</div>

<script>
// ---- 状態 ----
const state = {
  os: null,          // 'mac' | 'win'
  osVersion: null,   // mac: 'yes'|'no'  /  win: 'new'|'mid'|'old'
  sms: null,         // 'yes'|'no'
  login: null,       // 'yes'|'no'
  google: null,      // 'yes'|'no'
  budget: null,      // 'yes'|'no'
  install: null,     // 'none'|'partial'|'done'
};

// ---- 質問定義 ----
function getQuestions() {
  const qs = [];

  // Q1: インストール状態
  qs.push({
    id: 'q1',
    num: 1,
    tag: '【インストール状態】',
    text: 'クロコ（Claude Code）のインストール状況を教えてください',
    note: '現在の状況を正直に選んでください。',
    buttons: [
      { label: 'まだ何もしていない', value: 'none',    color: 'green'  },
      { label: '途中まで試した',    value: 'partial', color: 'orange' },
      { label: 'インストール完了',  value: 'done',    color: 'orange' },
    ],
    key: 'install',
    alert: state.install === 'done'
      ? { type: 'stop', text: 'このオフ会はクロコを「これからインストールする初心者」を対象にしています。\n参加は歓迎しますが、インストール後の活用方法・技術的なアドバイスなどには対応できません。' }
      : null,
    cardClass: state.install === 'done' ? 'answered-stop' : state.install === 'partial' ? 'answered-warn' : state.install === 'none' ? 'answered-ok' : '',
  });

  // Q2以降はインストール状況を選んだ後に表示
  if (!state.install) return qs;

  // Q2: OS選択
  qs.push({
    id: 'q2',
    num: 2,
    tag: '【端末確認】',
    text: 'ノートパソコンの種類を教えてください',
    note: 'スマホ・タブレットでは「クロコ」は動きません。',
    buttons: [
      { label: 'Mac', value: 'mac', color: 'green' },
      { label: 'Windows', value: 'win', color: 'orange' },
    ],
    key: 'os',
    alert: null,
    cardClass: state.os ? 'answered-ok' : '',
  });

  // Q3: OS バージョン（OS選択後に表示）
  if (state.os === 'mac') {
    qs.push({
      id: 'q3',
      num: 3,
      tag: '【OS確認】',
      text: 'macOS のバージョンを教えてください',
      note: 'クロコ（Claude Code デスクトップ版）は macOS Tahoe（15）以上での動作が推奨されています。',
      buttons: [
        { label: 'Tahoe（macOS 15）', value: 'tahoe', color: 'green'  },
        { label: 'Sequoia 以前 / わからない', value: 'old', color: 'orange' },
      ],
      key: 'osVersion',
      alert: state.osVersion === 'old'
        ? { type: 'warn', text: '⚠️ macOS Tahoe（15）以外ではクロコが動作しない可能性があります。\n事前に「システム設定 → 一般 → ソフトウェアアップデート」から Tahoe にアップデートしてください。\nオフ会当日のアップデートは時間内に終わりません。' }
        : null,
      cardClass: state.osVersion === 'tahoe' ? 'answered-ok' : state.osVersion === 'old' ? 'answered-warn' : '',
    });
  }

  if (state.os === 'win') {
    qs.push({
      id: 'q3',
      num: 3,
      tag: '【OS確認】',
      text: 'PC を購入したのはいつ頃ですか？',
      note: '購入から 5 年以上経過した PC は Windows 11 非対応の場合があり、クロコが動かない可能性があります。',
      buttons: [
        { label: '2022年以降（4年以内）', value: 'new', color: 'green'  },
        { label: '2021年以前（5年以上前）', value: 'old', color: 'orange' },
      ],
      key: 'osVersion',
      alert: state.osVersion === 'old'
        ? { type: 'warn', text: '⚠️ 購入から 5 年以上経過した PC は Windows 11 非対応の可能性があります。\nクロコが動作しない場合があるため、事前にスペックをご確認ください。\nWindows Update で最新状態にしてからご参加ください。' }
        : null,
      cardClass: state.osVersion === 'new' ? 'answered-ok' : state.osVersion === 'old' ? 'answered-warn' : '',
    });
  }

  // 以下はOS・OSバージョンまで回答済みの場合に表示
  const showRest = state.os && state.osVersion;

  if (showRest) {
    qs.push({
      id: 'q4',
      num: 4,
      tag: '【認証確認】',

      text: 'スマホで SMS（ショートメッセージ）を受信できますか？',
      note: '認証番号が届かないとアカウントが作れません。「自分宛てにテスト送信」して確認してください。',
      buttons: [
        { label: 'Yes', value: 'yes', color: 'green' },
        { label: 'No',  value: 'no',  color: 'orange' },
      ],
      key: 'sms',
      alert: state.sms === 'no'
        ? { type: 'ng', text: 'SMS を受信できないとアカウントが作れません。キャリア設定やフィルターをご確認ください。' }
        : null,
      cardClass: state.sms === 'yes' ? 'answered-ok' : state.sms === 'no' ? 'answered-ng' : '',
    });

    qs.push({
      id: 'q5',
      num: 5,
      tag: '【セキュリティ】',
      text: 'PC にログイン（ロック解除）できますか？',
      note: 'パスワード（PIN）を忘れていると、ソフトのインストールが一切できません。',
      buttons: [
        { label: 'Yes', value: 'yes', color: 'green' },
        { label: 'No',  value: 'no',  color: 'orange' },
      ],
      key: 'login',
      alert: state.login === 'no'
        ? { type: 'ng', text: '事前にパスワードを確認・リセットしてからご参加ください。' }
        : null,
      cardClass: state.login === 'yes' ? 'answered-ok' : state.login === 'no' ? 'answered-ng' : '',
    });

    qs.push({
      id: 'q6',
      num: 6,
      tag: '【アカウント】',
      text: 'Google アカウント（Gmail）をお持ちですか？',
      note: 'ログインや認証に必要です。アカウント未作成の場合は事前に作成してください。',
      buttons: [
        { label: 'Yes', value: 'yes', color: 'green' },
        { label: 'No',  value: 'no',  color: 'orange' },
      ],
      key: 'google',
      alert: state.google === 'no'
        ? { type: 'warn', text: '事前に Google アカウントを作成してきてください（無料）。' }
        : null,
      cardClass: state.google === 'yes' ? 'answered-ok' : state.google === 'no' ? 'answered-ng' : '',
    });

    qs.push({
      id: 'q7',
      num: 7,
      tag: '【予算確認】',
      text: '有料版（月額 22 ドル）の支払いができるクレジットカードをお持ちですか？',
      note: 'クロコは有料プラン専用です。デビットカード・プリペイドカードは使えない場合があります。',
      buttons: [
        { label: 'Yes', value: 'yes', color: 'green' },
        { label: 'No',  value: 'no',  color: 'orange' },
      ],
      key: 'budget',
      alert: state.budget === 'no'
        ? { type: 'ng', text: '有料プランの登録にクレジットカードが必要です。事前にご準備ください。' }
        : null,
      cardClass: state.budget === 'yes' ? 'answered-ok' : state.budget === 'no' ? 'answered-ng' : '',
    });
  }

  return qs;
}

// ---- 描画 ----
function render() {
  const qs = getQuestions();
  const container = document.getElementById('q-list');
  container.innerHTML = '';

  qs.forEach(q => {
    const div = document.createElement('div');
    div.className = 'q-card ' + (q.cardClass || '');

    const btns = q.buttons.map(b => {
      const active = state[q.key] === b.value ? ' active' : '';
      return `<button class="btn btn-${b.color}${active}" onclick="choose('${q.key}','${b.value}')">${b.label}</button>`;
    }).join('');

    let alertHtml = '';
    if (q.alert) {
      alertHtml = `<div class="alert alert-${q.alert.type}">${q.alert.text.replace(/\n/g,'<br>')}</div>`;
    }

    div.innerHTML = `
      <div class="q-num">${q.num}. ${q.tag}</div>
      <div class="q-text">${q.text}</div>
      <div class="btn-group">${btns}</div>
      ${alertHtml}
      <div class="q-note">💡 ${q.note}</div>
    `;
    container.appendChild(div);
  });

  updateDraft(qs);
}

function choose(key, value) {
  state[key] = value;
  if (key === 'install')   { state.os = null; state.osVersion = null; resetRestState(); }
  if (key === 'os')        { state.osVersion = null; resetRestState(); }
  if (key === 'osVersion') { resetRestState(); }
  render();
}

function resetRestState() {
  state.sms = null; state.login = null; state.google = null; state.budget = null;
}

// ---- 下書き生成 ----
function updateDraft(qs) {
  const statusEl = document.getElementById('draft-status');
  const draftEl  = document.getElementById('draft');

  // 未回答チェック
  const required = qs.map(q => q.key);
  const unanswered = required.filter(k => state[k] === null);
  const copyBtn = document.querySelector('.copy-btn');
  if (unanswered.length > 0) {
    statusEl.innerHTML = '';
    draftEl.value = '';
    copyBtn.disabled = true;
    return;
  }
  copyBtn.disabled = false;

  // 下書き構築
  const installLabel = { none: 'まだ何もしていない', partial: '途中まで試した', done: 'インストール完了' }[state.install] || '';
  const osLabel = state.os === 'mac' ? 'Mac' : 'Windows';

  let osVerLabel = '';
  if (state.os === 'mac') {
    osVerLabel = state.osVersion === 'tahoe' ? 'Tahoe（macOS 15）' : 'Sequoia以前 / 不明';
  } else {
    const map = { new: '2022年以降', old: '2021年以前（5年以上前）' };
    osVerLabel = map[state.osVersion] || '';
  }

  const yn = v => v === 'yes' ? 'Yes' : 'No';

  const lines = [
    '問診チェック結果をお伝えします。',
    '',
    `1. インストール状況：${installLabel}`,
    `2. 端末：${osLabel}`,
    `3. OS：${osVerLabel}`,
    `4. SMS受信：${yn(state.sms)}`,
    `5. PCログイン：${yn(state.login)}`,
    `6. Googleアカウント：${yn(state.google)}`,
    `7. 予算（クレカ）：${yn(state.budget)}`,
  ];

  const ngItems = [];
  if (state.os === 'mac' && state.osVersion === 'old') ngItems.push('macOS が Tahoe 未満の可能性あり');
  if (state.os === 'win' && state.osVersion === 'old') ngItems.push('PC が古い（5年以上前）');
  if (state.sms    === 'no')  ngItems.push('SMS受信できない');
  if (state.login  === 'no')  ngItems.push('PCにログインできない');
  if (state.google === 'no')  ngItems.push('Googleアカウントなし');
  if (state.budget === 'no')  ngItems.push('クレジットカードなし');

  if (ngItems.length > 0) {
    lines.push('', `⚠️ 要確認：${ngItems.join(' / ')}`);
    statusEl.innerHTML = `<div class="alert alert-warn" style="margin-bottom:10px">⚠️ 要確認の項目があります。下書きをコピーして送ってください。</div>`;
  } else {
    statusEl.innerHTML = `<div class="alert alert-ok" style="margin-bottom:10px">✅ 全項目OK！下書きをコピーして送ってください。</div>`;
  }

  draftEl.value = lines.join('\n');
}

function copyDraft() {
  const draft = document.getElementById('draft');
  if (!draft.value) return;
  navigator.clipboard.writeText(draft.value).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.textContent = 'コピーしました！';
    setTimeout(() => { msg.textContent = ''; }, 2000);
  });
}

function resetAll() {
  Object.keys(state).forEach(k => { state[k] = null; });
  document.getElementById('copy-msg').textContent = '';
  render();
}

render();
</script>
</body>
</html>
